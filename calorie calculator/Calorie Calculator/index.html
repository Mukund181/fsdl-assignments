<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="box">
    <h1>Maintenance Calories Calculator</h1>
    <h3>Please Enter your Details</h3>

    <form id="details" action="target.html">
        <label>Select Gender:</label>
        <input id="Male" type="radio" name="Gender" value="Male" class="gender">
        <label for="Male">Male</label>

        <input id="Female" type="radio" name="Gender" value="Female" class="gender">
        <label for="Female">Female</label>
        <br>

        <label for="Weight">Enter Weight:</label>
        <input id="Weight" type="text" name="Weight" placeholder="In KG">
        <br>

        <label for="Height">Enter Height:</label>
        <input id="Height" type="text" name="Height" placeholder="In CM">
        <br>

        <label for="Age">Enter Age:</label>
        <input id="Age" type="text" name="Age" placeholder="In Years">
        <br>

        <label for="Activity">Choose Your activity Level:</label>
        <select id="Activity" name="Activity">
            <option value="sedentary">Sedentary: little or no exercise</option>
            <option value="light">Light: 1-3 times exercise per week</option>
            <option value="moderate">Moderate: exercise 4-5 times a week</option>
            <option value="active">Active: exercise 6-7 times a week or intense exercise 3-4 times</option>
            <option value="hyperactive">Very Active: intense exercise 6-7 times a week</option>
        </select>
        <br>

        <input type="submit" id="submit" value="Calculate">
    </form>

    <br>
    <h3>Important Considerations :</h3>
    <ul>
        <li>Exercise: 15-30 minutes of elevated heart rate activity.</li>
        <li>Intense exercise: 45-120 minutes of elevated heart rate activity.</li>
        <li>Very intense exercise: 2+ hours of elevated heart rate activity.</li>
    </ul>
</div>
<script src="script.js"></script>
</body>
</html>
